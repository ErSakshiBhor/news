kind = "web"
previewPath = "/"
title = "NewsMonkey"
version = "1.0.0"
id = "artifacts/news-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22315

[services.development]
run = "pnpm --filter @workspace/news-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/news-app", "run", "build" ]
publicDir = "artifacts/news-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22315"
BASE_PATH = "/"
